{% extends "base.html" %}

{% block title %}DESPU Hostel | Allocate Room{% endblock %}

{% block content %}
<section class="page-top">
    <div>
        <h2 class="page-title">Allocate Room</h2>
    </div>
    <a href="/allocations" class="ghost-btn"><i class="fa-solid fa-arrow-left"></i> Back to Allocations</a>
</section>

<section class="form-panel premium-panel">
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="post">
        <div class="form-grid">
            <div class="field">
                <label for="student_id">Student</label>
                <div class="field-control">
                    <select id="student_id" name="student_id" required>
                        <option value="">Select student</option>
                        {% for s in students %}
                        <option value="{{ s.student_id }}">{{ s.first_name }} {{ s.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="room_id">Room</label>
                <div class="field-control">
                    <select id="room_id" name="room_id" required>
                        <option value="">Select available room</option>
                        {% for r in rooms %}
                        <option value="{{ r.room_id }}">Room {{ r.room_no }} | {{ r.occupied }}/{{ r.capacity }} occupied</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn"><i class="fa-solid fa-check"></i> Allocate Room</button>
            <a href="/allocations" class="ghost-btn"><i class="fa-solid fa-xmark"></i> Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
