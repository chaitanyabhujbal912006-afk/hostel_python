{% extends "base.html" %}

{% block title %}DESPU Hostel | Add Expense{% endblock %}

{% block content %}
<section class="page-top">
    <div>
        <h2 class="page-title">Add Expenses</h2>
    </div>
    <a href="/expenses" class="ghost-btn"><i class="fa-solid fa-arrow-left"></i> Back to Expenses</a>
</section>

<section class="form-panel premium-panel">
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="post">
        <div class="form-grid">
            <div class="field field-span-2">
                <label for="expense_type">Expense Type</label>
                <div class="field-control">
                    <select id="expense_type" name="expense_type" required>
                        <option value="">Select expense type</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                        <option value="Maintenance">Maintenance</option>
                        <option value="Cleaning">Cleaning</option>
                        <option value="Security">Security</option>
                        <option value="Internet">Internet</option>
                        <option value="Furniture">Furniture</option>
                        <option value="Kitchen">Kitchen</option>
                        <option value="Medical">Medical</option>
                        <option value="Repairs">Repairs</option>
                        <option value="Staff Salary">Staff Salary</option>
                        <option value="Food">Food</option>
                        <option value="Supplies">Supplies</option>
                        <option value="Transport">Transport</option>
                        <option value="Other">Other</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <div class="field-control">
                    <input id="amount" type="number" step="0.01" name="amount" placeholder="5000" required>
                </div>
            </div>

            <div class="field">
                <label for="expense_date">Date</label>
                <div class="field-control">
                    <input id="expense_date" type="date" name="expense_date" required>
                </div>
            </div>

            <div class="field field-span-2">
                <label for="description">Description</label>
                <div class="field-control">
                    <textarea id="description" name="description" rows="4" placeholder="Optional details about this expense"></textarea>
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn"><i class="fa-solid fa-check"></i> Add Expense</button>
            <a href="/expenses" class="ghost-btn"><i class="fa-solid fa-xmark"></i> Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
