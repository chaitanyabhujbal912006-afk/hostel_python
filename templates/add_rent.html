{% extends "base.html" %}

{% block title %}DESPU Hostel | Add Rent{% endblock %}

{% block content %}
<section class="page-top">
    <div>
        <h2 class="page-title">Add Rent</h2>
    </div>
    <a href="/rents" class="ghost-btn"><i class="fa-solid fa-arrow-left"></i> Back to Rent Records</a>
</section>

<section class="form-panel premium-panel">
    {% if error %}
    <div class="alert">{{ error }}</div>
    {% endif %}

    <form method="post">
        <div class="form-grid">
            <div class="field">
                <label for="student_id">Student</label>
                <div class="field-control">
                    <select id="student_id" name="student_id" required>
                        <option value="">Select student</option>
                        {% for s in students %}
                        <option value="{{ s.student_id }}">{{ s.first_name }} {{ s.last_name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="month_year">Billing Month</label>
                <div class="field-control">
                    <input id="month_year" type="month" name="month_year" required>
                </div>
            </div>

            <div class="field">
                <label for="amount">Amount</label>
                <div class="field-control">
                    <input id="amount" type="number" step="0.01" name="amount" placeholder="5000" required>
                </div>
            </div>

            <div class="field">
                <label for="due_date">Due Date</label>
                <div class="field-control">
                    <input id="due_date" type="date" name="due_date" required>
                </div>
            </div>

            <div class="field">
                <label for="status">Status</label>
                <div class="field-control">
                    <select id="status" name="status" required>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                        <option value="Cancelled">Cancelled</option>
                    </select>
                </div>
            </div>

            <div class="field">
                <label for="paid_date">Paid Date</label>
                <div class="field-control">
                    <input id="paid_date" type="date" name="paid_date">
                </div>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-btn"><i class="fa-solid fa-check"></i> Save Rent Record</button>
            <a href="/rents" class="ghost-btn"><i class="fa-solid fa-xmark"></i> Cancel</a>
        </div>
    </form>
</section>
{% endblock %}
